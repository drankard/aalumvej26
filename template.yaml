AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Aalumvej26 - React + Lambda + DynamoDB

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 256

Parameters:
  Stage:
    Type: String
    Default: prod
  CertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 for aalumvej26.dk (required for CloudFront)
    Default: ''
  DomainName:
    Type: String
    Default: aalumvej26.dk
  AlertEmail:
    Type: String
    Default: david@graveyard.dk
    Description: Email for content pipeline notifications and alarms

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub aalumvej26-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  AppFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aalumvej26-${Stage}
      CodeUri: backend/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          STAGE: !Ref Stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        RpcEndpoint:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppApi
            Path: /rpc
            Method: POST

  AppApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # Content Pipeline Lambda — deterministic batch pipeline (REFACTOR_PLAN.md)
  ContentPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aalumvej26-content-pipeline-${Stage}
      CodeUri: backend/lambdas/content_pipeline/
      Handler: app.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          SNS_TOPIC_ARN: !Ref ContentSummaryTopic
          MODEL_ID_PARAM: /aalumvej26/ai/model-id
          SEARCH_PROVIDER: serpapi
          SERPAPI_KEY_PARAM: /aalumvej26/search/serpapi-key
          CONTENT_REBUILD_PROJECT: !Ref ContentRebuildProject
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - Statement:
            - Sid: StartContentRebuild
              Effect: Allow
              Action:
                - codebuild:StartBuild
              Resource: !GetAtt ContentRebuildProject.Arn
            - Sid: BedrockInvoke
              Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - 'arn:aws:bedrock:*::foundation-model/*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*'
                - 'arn:aws:bedrock:*:*:inference-profile/*'
            - Sid: SSMRead
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aalumvej26/*'
            - Sid: SNSPublish
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref ContentSummaryTopic

  # Dead-man canary — alerts when a scheduled run left no PIPELINE_RUN row
  PipelineCanaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aalumvej26-pipeline-canary-${Stage}
      CodeUri: backend/lambdas/pipeline_canary/
      Handler: canary.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          SNS_TOPIC_ARN: !Ref ContentSummaryTopic
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AppTable
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref ContentSummaryTopic

  OplevelsCanarySchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aalumvej26-oplevelser-canary-${Stage}
      ScheduleExpression: 'cron(0 3 ? * SUN *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt PipelineCanaryFunction.Arn
          Id: OplevelsCanaryTarget
          Input: '{"pipeline": "oplevelser", "max_age_hours": 6}'

  OplevelsCanaryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PipelineCanaryFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OplevelsCanarySchedule.Arn

  OmraadetCanarySchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aalumvej26-omraadet-canary-${Stage}
      ScheduleExpression: 'cron(0 9 ? * 2#1 *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt PipelineCanaryFunction.Arn
          Id: OmraadetCanaryTarget
          Input: '{"pipeline": "omraadet", "max_age_hours": 6}'

  OmraadetCanaryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PipelineCanaryFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OmraadetCanarySchedule.Arn

  PipelineDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub aalumvej26-pipeline-dlq-${Stage}
      MessageRetentionPeriod: 1209600

  PipelineErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub aalumvej26-content-pipeline-errors-${Stage}
      AlarmDescription: Content pipeline Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ContentPipelineFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ContentSummaryTopic

  # --- Content-driven site rebuild -----------------------------------------
  # The frontend is a static Astro build: content changes only reach the live
  # site via a rebuild. The pipeline Lambda triggers this CodeBuild project at
  # the end of every successful run (and backfill --apply), so the refresh is
  # event-driven — EventBridge stays the only scheduler in the system. The
  # buildspec just clones main and runs scripts/deploy-frontend.sh, the same
  # script deploy.yml uses, so build logic exists exactly once.

  ContentRebuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub aalumvej26-content-rebuild-${Stage}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: content-rebuild
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/aalumvej26-content-rebuild-*
              - Sid: ReadStackOutputs
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/aalumvej26/*
              - Sid: SyncFrontendBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::aalumvej26-frontend-${Stage}
                  - !Sub arn:aws:s3:::aalumvej26-frontend-${Stage}/*
              - Sid: InvalidateCloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/*

  ContentRebuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub aalumvej26-content-rebuild-${Stage}
      Description: Rebuild the static frontend from live content (triggered by the content pipeline)
      ServiceRole: !GetAtt ContentRebuildRole.Arn
      TimeoutInMinutes: 15
      ConcurrentBuildLimit: 1
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: STACK_NAME
            Value: aalumvej26
      Source:
        Type: NO_SOURCE
        BuildSpec: !Sub |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 20
            build:
              commands:
                - git clone --depth 1 https://github.com/drankard/aalumvej26.git repo
                - cd repo && ./scripts/deploy-frontend.sh

  ContentRebuildFailureRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aalumvej26-content-rebuild-failed-${Stage}
      Description: Alert via SNS when a content-triggered site rebuild fails
      EventPattern:
        source:
          - aws.codebuild
        detail-type:
          - CodeBuild Build State Change
        detail:
          build-status:
            - FAILED
            - FAULT
            - STOPPED
            - TIMED_OUT
          project-name:
            - !Ref ContentRebuildProject
      State: ENABLED
      Targets:
        - Arn: !Ref ContentSummaryTopic
          Id: RebuildFailureSns
          InputTransformer:
            InputPathsMap:
              status: $.detail.build-status
              project: $.detail.project-name
            InputTemplate: '"[aalumvej26] Site rebuild <status> (CodeBuild project <project>). The live site was NOT updated — check the CodeBuild logs in the AWS console."'

  # EventBridge -> SNS requires an explicit topic policy (CloudWatch alarms do
  # not). The Owner/CloudWatch statements preserve the access the topic
  # already relies on, since a TopicPolicy replaces the default policy.
  ContentSummaryTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref ContentSummaryTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OwnerAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sns:Publish
              - sns:Subscribe
              - sns:Receive
              - sns:GetTopicAttributes
              - sns:SetTopicAttributes
              - sns:ListSubscriptionsByTopic
              - sns:AddPermission
              - sns:RemovePermission
              - sns:DeleteTopic
            Resource: !Ref ContentSummaryTopic
          - Sid: CloudWatchAlarmsPublish
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref ContentSummaryTopic
          - Sid: EventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref ContentSummaryTopic
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt ContentRebuildFailureRule.Arn

  OplevelsSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aalumvej26-oplevelser-schedule-${Stage}
      ScheduleExpression: 'cron(0 0 ? * SUN *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ContentPipelineFunction.Arn
          Id: OplevelsTarget
          Input: '{"pipeline": "oplevelser"}'
          DeadLetterConfig:
            Arn: !GetAtt PipelineDLQ.Arn

  OplevelsSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContentPipelineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OplevelsSchedule.Arn

  OmraadetSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub aalumvej26-omraadet-schedule-${Stage}
      ScheduleExpression: 'cron(0 6 ? * 2#1 *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ContentPipelineFunction.Arn
          Id: OmraadetTarget
          Input: '{"pipeline": "omraadet"}'
          DeadLetterConfig:
            Arn: !GetAtt PipelineDLQ.Arn

  OmraadetSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContentPipelineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OmraadetSchedule.Arn

  ContentSummaryTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub aalumvej26-content-summary-${Stage}
      DisplayName: Aalumvej26 Content Pipeline

  ContentSummarySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref ContentSummaryTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  DLQMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub aalumvej26-content-dlq-messages-${Stage}
      AlarmDescription: Messages in content pipeline DLQ
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt PipelineDLQ.QueueName
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ContentSummaryTopic

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Sub www.${DomainName}
        Origins:
          - Id: S3Website
            DomainName: !Sub aalumvej26-frontend-${Stage}.s3-website-${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Website
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: eaab4381-ed33-4a86-88ca-d9558dc6cd63
        # No SPA fallback: the site is fully static multi-page (Astro), so
        # missing paths surface as real 404s (S3 website ErrorDocument serves
        # /404.html with a 404 status). This avoids soft-404s in search/AI
        # indexing.
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2and3

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub aalumvej26-frontend-${Stage}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: 404.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

Outputs:
  ApiUrl:
    Value: !Sub https://${AppApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  FrontendBucket:
    Value: !Ref FrontendBucket
  TableName:
    Value: !Ref AppTable
  CloudFrontDomain:
    Condition: HasCertificate
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Condition: HasCertificate
    Value: !Ref CloudFrontDistribution
