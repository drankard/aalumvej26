AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Aalumvej26 - React + Lambda + DynamoDB

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 256

Parameters:
  Stage:
    Type: String
    Default: prod

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub aalumvej26-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  AppFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aalumvej26-${Stage}
      CodeUri: backend/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          STAGE: !Ref Stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        RpcEndpoint:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppApi
            Path: /rpc
            Method: POST

  AppApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub aalumvej26-frontend-${Stage}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

Outputs:
  ApiUrl:
    Value: !Sub https://${AppApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  FrontendBucket:
    Value: !Ref FrontendBucket
  TableName:
    Value: !Ref AppTable
