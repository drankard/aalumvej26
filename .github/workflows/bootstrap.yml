name: Update bootstrap (deploy role)

# Applies bootstrap.yaml to the OIDC/deploy-role stack. The deploy role can
# self-update (iam:PutRolePolicy on role/* + CloudFormationFullAccess).
# Run this BEFORE re-running Deploy for the pipeline release — it grants the
# SQS/CloudWatch/Bedrock permissions the release changeset needs.

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: "Name of the existing bootstrap CloudFormation stack"
        default: aalumvej26-bootstrap
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Update bootstrap stack
        run: |
          aws cloudformation deploy \
            --template-file bootstrap.yaml \
            --stack-name "${{ inputs.stack_name }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
