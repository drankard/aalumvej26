name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - uses: aws-actions/setup-sam@v2

      - name: Package agent runtime
        run: |
          mkdir -p .agent-build
          uv pip install \
            -r backend/agentcore_runtimes/content/requirements.txt \
            --target .agent-build \
            --python-platform aarch64-manylinux2014 \
            --only-binary :all: \
            --python-version 3.12
          cp -r backend/agentcore_runtimes/content/* .agent-build/
          cd .agent-build
          zip -r ../agent-runtime.zip . -x "__pycache__/*" "*.pyc"

      - name: Upload agent runtime to S3
        id: agent
        run: |
          HASH=$(sha256sum agent-runtime.zip | cut -c1-16)
          KEY="agent-runtime/${HASH}.zip"
          BUCKET=$(aws cloudformation describe-stacks --stack-name aalumvej26 --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucket`].OutputValue' --output text 2>/dev/null || echo "")
          SAM_BUCKET=$(aws s3api list-buckets --query 'Buckets[?starts_with(Name,`aws-sam-cli-managed`)].Name' --output text | head -1)
          aws s3 cp agent-runtime.zip s3://${SAM_BUCKET}/${KEY}
          echo "bucket=${SAM_BUCKET}" >> $GITHUB_OUTPUT
          echo "key=${KEY}" >> $GITHUB_OUTPUT

      - name: SAM build
        run: sam build --config-env ci

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --config-env ci \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              "ContentAgentCodeBucket=${{ steps.agent.outputs.bucket }} ContentAgentCodeKey=${{ steps.agent.outputs.key }}"

      - name: Get stack outputs
        id: stack
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name aalumvej26 --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' --output text)
          BUCKET=$(aws cloudformation describe-stacks --stack-name aalumvej26 --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucket`].OutputValue' --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=${{ steps.stack.outputs.api_url }} npm run build

      - name: Deploy frontend
        run: aws s3 sync frontend/dist s3://${{ steps.stack.outputs.bucket }} --delete
