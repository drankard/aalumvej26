name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --config-env ci

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --config-env ci \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              "CertificateArn=arn:aws:acm:us-east-1:622327379339:certificate/d4006225-e2c7-49cb-80a2-b8073e8b10d0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Same script the content-rebuild CodeBuild project runs — build logic
      # exists exactly once (scripts/deploy-frontend.sh).
      - name: Build and publish frontend
        run: ./scripts/deploy-frontend.sh
