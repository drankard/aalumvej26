AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  GitHub Actions OIDC provider and least-privilege deploy role for aalumvej26.
  NOTE: the live role predates this file and is not CloudFormation-managed
  (the aalumvej26-bootstrap stack is a ROLLBACK_COMPLETE corpse). This file is
  the source of truth for what the role SHOULD be; .github/workflows/
  harden-role.yml applies the scoped policy to the live role in stages.
  If the role ever needs recreation from scratch, deploy this template with
  admin credentials after deleting the dead stack and the existing role.

Parameters:
  GitHubOrg:
    Type: String
    Default: drankard
  GitHubRepo:
    Type: String
    Default: aalumvej26

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${GitHubRepo}-github-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: aalumvej26-scoped
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationOnAppStacks
                Effect: Allow
                Action:
                  - cloudformation:*
                Resource:
                  - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/aalumvej26*/*
                  - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/aws-sam-cli-managed-default/*
              - Sid: CloudFormationTransform
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                Resource: arn:aws:cloudformation:*:aws:transform/*
              - Sid: SamArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:CreateBucket
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                Resource:
                  - arn:aws:s3:::aws-sam-cli-managed-default*
                  - arn:aws:s3:::aws-sam-cli-managed-default*/*
              - Sid: FrontendBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketWebsite
                  - s3:GetBucketWebsite
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketAcl
                  - s3:PutBucketTagging
                Resource:
                  - arn:aws:s3:::aalumvej26-*
                  - arn:aws:s3:::aalumvej26-*/*
              - Sid: DynamoDBAppTables
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                Resource: !Sub arn:aws:dynamodb:*:${AWS::AccountId}:table/aalumvej26-*
              - Sid: LambdaAppFunctions
                Effect: Allow
                Action:
                  - lambda:*
                Resource:
                  - !Sub arn:aws:lambda:*:${AWS::AccountId}:function:aalumvej26-*
              - Sid: ApiGateway
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource:
                  - arn:aws:apigateway:*::/apis
                  - arn:aws:apigateway:*::/apis/*
                  - arn:aws:apigateway:*::/tags/*
              - Sid: EventsAppRules
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:EnableRule
                  - events:DisableRule
                  - events:TagResource
                  - events:UntagResource
                  - events:ListTagsForResource
                Resource: !Sub arn:aws:events:*:${AWS::AccountId}:rule/aalumvej26-*
              - Sid: SqsAppQueues
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:TagQueue
                  - sqs:UntagQueue
                  - sqs:ListQueueTags
                Resource: !Sub arn:aws:sqs:*:${AWS::AccountId}:aalumvej26-*
              - Sid: CloudWatchAppAlarms
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                Resource: !Sub arn:aws:cloudwatch:*:${AWS::AccountId}:alarm:aalumvej26-*
              - Sid: SnsAppTopics
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:TagResource
                  - sns:UntagResource
                  - sns:ListTagsForResource
                Resource: !Sub arn:aws:sns:*:${AWS::AccountId}:aalumvej26-*
              - Sid: SsmAppParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:PutParameter
                Resource: !Sub arn:aws:ssm:*:${AWS::AccountId}:parameter/aalumvej26/*
              - Sid: CloudFrontForFrontend
                Effect: Allow
                Action:
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:CreateInvalidation
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:ListTagsForResource
                Resource: '*'
              - Sid: AcmReadForCloudFront
                Effect: Allow
                Action:
                  - acm:DescribeCertificate
                  - acm:ListCertificates
                Resource: '*'
              - Sid: IamManageAppRolesOnly
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/aalumvej26-*
              - Sid: IamPassAppRolesToLambda
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/aalumvej26-*
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com
              - Sid: CodeBuildManageAppProjects
                Effect: Allow
                Action:
                  - codebuild:CreateProject
                  - codebuild:UpdateProject
                  - codebuild:DeleteProject
                  - codebuild:BatchGetProjects
                Resource: !Sub arn:aws:codebuild:*:${AWS::AccountId}:project/aalumvej26-*
              - Sid: IamPassAppRolesToCodeBuild
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/aalumvej26-*
                Condition:
                  StringEquals:
                    iam:PassedToService: codebuild.amazonaws.com
              - Sid: NeverModifySelf
                Effect: Deny
                Action:
                  - iam:*
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${GitHubRepo}-github-deploy

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
